<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud DevOps Project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
            background: rgba(255,255,255,0.05);
            padding:50px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            width:90%;
            max-width:700px;
        }

        h1{
            font-size:48px;
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:20px;
            line-height:1.8;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        .tags{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:15px;
        }

        .tag{
            background:#38bdf8;
            color:#0f172a;
            padding:10px 18px;
            border-radius:30px;
            font-weight:bold;
        }

        .footer{
            margin-top:35px;
            font-size:14px;
            color:#94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Cloud DevOps Project</h1>

        <p>
            This website is deployed on AWS EC2 using Docker
            and automated with modern DevOps practices.
        </p>

        <div class="tags">
            <div class="tag">AWS EC2</div>
            <div class="tag">Docker</div>
            <div class="tag">Nginx</div>
            <div class="tag">CI/CD</div>
            <div class="tag">GitHub Actions</div>
        </div>

        <div class="footer">
            Built by Mostafa elabiad
        </div>

    </div>

</body>
</html>
