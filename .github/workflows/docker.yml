name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build -t elabiadooo0z/simnet-frontend:latest ./frontend

      - name: Build Backend Image
        run: |
          docker build -t elabiadooo0z/simnet-backend:latest ./backend

      - name: Push Frontend Image
        run: |
          docker push elabiadooo0z/simnet-frontend:latest

      - name: Push Backend Image
        run: |
          docker push elabiadooo0z/simnet-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            sudo docker pull elabiadooo0z/simnet-frontend:latest
            sudo docker pull elabiadooo0z/simnet-backend:latest

            sudo docker rm -f simnet-dashboard || true
            sudo docker rm -f backend-api || true

            sudo docker run -d \
              --restart always \
              -p 4000:80 \
              --name simnet-dashboard \
              elabiadooo0z/simnet-frontend:latest

            sudo docker run -d \
              --restart always \
              -p 5000:5000 \
              --name backend-api \
              elabiadooo0z/simnet-backend:latest