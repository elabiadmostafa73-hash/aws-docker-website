<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimNet Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#38bdf8;
      font-size:42px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .title{
      color:#94a3b8;
      margin-bottom:15px;
      font-size:18px;
    }

    .value{
      font-size:32px;
      font-weight:bold;
      color:#22c55e;
    }

  </style>

</head>

<body>

  <h1>SimNet DevOps Dashboard</h1>

  <div class="container">

    <div class="card">
      <div class="title">Server Status</div>
      <div class="value" id="status">Loading...</div>
    </div>

    <div class="card">
      <div class="title">Docker Containers</div>
      <div class="value" id="containers">Loading...</div>
    </div>

    <div class="card">
      <div class="title">CPU Usage</div>
      <div class="value" id="cpu">Loading...</div>
    </div>

    <div class="card">
      <div class="title">RAM Usage</div>
      <div class="value" id="ram">Loading...</div>
    </div>

   <div class="card">
    <div class="title">Disk Usage</div>
    <div class="value" id="disk">Loading...</div>
  </div>
  </div>

  <script>

    async function loadStats() {

      const response = await fetch("/api/stats");

      const data = await response.json();

      document.getElementById("status").innerText = data.status;

      document.getElementById("containers").innerText = data.containers;

      document.getElementById("cpu").innerText = data.cpu;

      document.getElementById("ram").innerText = data.ram;

      document.getElementById("disk").innerText = data.disk;

    }

    loadStats();

    setInterval(loadStats, 5000);

  </script>

</body>
</html>
